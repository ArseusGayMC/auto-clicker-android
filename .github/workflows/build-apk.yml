name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            mkdir -p gradle/wrapper

            # Write the wrapper properties pointing to official Gradle distribution
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

            # Download the official gradle-wrapper.jar
            curl -sL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar

            # Download the official gradlew script
            curl -sL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew" \
              -o gradlew
          fi
          chmod +x gradlew
          echo "--- gradle-wrapper.properties ---"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --build-cache

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          tag_name: build-${{ github.run_number }}
          body: |
            🎉 Auto Clicker APK Build #${{ github.run_number }}

            **Build Details:**
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}

            **Downloads:**
            - ✅ Debug APK: app-debug.apk
            - ✅ Release APK: app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build Successful!"
          else
            echo "❌ Build Failed!"
            exit 1
          fi
